[manifest]
version = "1.0.0"
dump_lua = true
priority = 0

# Store original info_queue
[[patches]]
[patches.pattern]
target = "functions/common_events.lua"
pattern = '''for _, v in ipairs(info_queue) do'''
position = "before"
payload = '''
if Glossary.flitered_info_queue_request then
    Glossary.flitered_info_queue_request = nil
    Glossary.process_info_queue(full_UI_table, info_queue)
end
'''
match_indent = true
