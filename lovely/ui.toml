[manifest]
version = "1.0.0"
dump_lua = true
priority = 10000000

# Allow blind chip be clickable
[[patches]]
[patches.pattern]
target = "functions/UI_definitions.lua"
pattern = '''local _reward = true'''
position = "after"
payload = '''
if blind_choice then
    blind_choice.animation.config = blind_choice.animation.config or {}
    blind_choice.animation.config.blind = blind_choice.config
    blind_choice.animation.states.collide.can = true
end
'''
match_indent = true

# Return from the first vanilla collection screen to the Glossary info screen
# when the collection was opened from Glossary's header.
[[patches]]
[patches.pattern]
target = "functions/UI_definitions.lua"
pattern = '''local t = create_UIBox_generic_options({ back_func = G.STAGE == G.STAGES.RUN and 'options' or 'exit_overlay_menu', contents = {'''
position = "at"
payload = '''local t = create_UIBox_generic_options({ back_func = Glossary and Glossary.has_saved_external_return and Glossary.has_saved_external_return() and 'glossary_return_to_saved_info' or G.STAGE == G.STAGES.RUN and 'options' or 'exit_overlay_menu', contents = {'''
match_indent = true

# Return from the first Steamodded mod UI screen to the Glossary info screen
# when a mod's additions tab was opened from Glossary's header.
[[patches]]
[patches.pattern]
target = '=[SMODS _ "src/ui.lua"]'
pattern = '''back_func = "mods_button",'''
position = "at"
payload = '''back_func = Glossary and Glossary.has_saved_external_return and Glossary.has_saved_external_return() and "glossary_return_to_saved_info" or "mods_button",'''
match_indent = true
